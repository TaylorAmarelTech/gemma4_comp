<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>DueCare</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
    --primary: #4f8cff; --danger: #ff4f4f; --warning: #ffb84f;
    --success: #4fff8c; --text: #e4e6ed; --text-dim: #8f93a2;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text); width: 360px;
    padding: 16px; font-size: 14px;
  }
  h1 { font-size: 16px; margin-bottom: 4px; color: var(--primary); }
  .tagline { color: var(--text-dim); font-size: 11px; margin-bottom: 12px; }
  textarea {
    width: 100%; min-height: 80px; padding: 8px; background: var(--surface);
    color: var(--text); border: 1px solid var(--border); border-radius: 4px;
    font-family: inherit; font-size: 13px; resize: vertical;
  }
  .row { display: flex; gap: 8px; margin-top: 8px; }
  select {
    flex: 1; padding: 6px; background: var(--surface); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
  }
  button {
    width: 100%; margin-top: 10px; padding: 10px; background: var(--primary);
    color: #fff; border: none; border-radius: 4px; font-weight: 600;
    cursor: pointer;
  }
  button:hover { opacity: 0.9; }
  #result { margin-top: 12px; display: none; }
  #result.visible { display: block; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 3px;
    font-size: 11px; font-weight: 700; text-transform: uppercase;
  }
  .grade-worst { background: var(--danger); color: #fff; }
  .grade-bad { background: #ff6b4f; color: #fff; }
  .grade-neutral { background: var(--warning); color: #1a1d27; }
  .grade-good { background: var(--success); color: #1a1d27; }
  .grade-best { background: #2dd4bf; color: #1a1d27; }
  .indicator {
    display: inline-block; background: rgba(255, 79, 79, 0.12);
    border: 1px solid var(--danger); border-radius: 3px;
    padding: 2px 6px; font-size: 11px; margin: 2px 3px 2px 0;
  }
  .resources { margin-top: 8px; font-size: 12px; }
  .resources a { color: var(--primary); text-decoration: none; }
  .footer {
    margin-top: 14px; padding-top: 10px; border-top: 1px solid var(--border);
    font-size: 11px; color: var(--text-dim); text-align: center;
  }
  .footer a { color: var(--primary); text-decoration: none; }
</style>
</head>
<body>
<h1>DueCare</h1>
<div class="tagline">On-device safety evaluator — privacy is non-negotiable.</div>

<textarea id="text" placeholder="Paste a job posting, chat message, or contract clause..."></textarea>

<div class="row">
  <select id="jurisdiction">
    <option value="">Jurisdiction: auto</option>
    <option value="PH_HK">PH → HK</option>
    <option value="PH_SA">PH → SA</option>
    <option value="BD_MY">BD → MY</option>
    <option value="NP_MY">NP → MY</option>
    <option value="ID_SA">ID → SA</option>
  </select>
  <select id="language">
    <option value="en">English</option>
    <option value="tl">Tagalog</option>
  </select>
</div>

<button id="analyze">Analyze</button>

<div id="result"></div>

<div class="footer">
  <a href="#" id="options">Settings</a> &bull;
  <a href="https://github.com/TaylorAmarelTech/gemma4_comp" target="_blank">GitHub</a>
</div>

<script src="popup.js"></script>
</body>
</html>
