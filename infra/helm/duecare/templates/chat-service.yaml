{{- if .Values.chat.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "duecare.fullname" . }}-chat
  labels:
    {{- include "duecare.labels" . | nindent 4 }}
    app.kubernetes.io/component: chat
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.chat.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "duecare.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: chat
{{- end }}
