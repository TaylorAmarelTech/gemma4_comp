{{- if .Values.chat.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "duecare.fullname" . }}-chat
  labels:
    {{- include "duecare.labels" . | nindent 4 }}
    app.kubernetes.io/component: chat
spec:
  {{- if not .Values.chat.autoscaling.enabled }}
  replicas: {{ .Values.chat.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "duecare.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: chat
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "duecare.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: chat
    spec:
      serviceAccountName: {{ include "duecare.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: chat
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            {{- range $k, $v := .Values.chat.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- if .Values.secrets.hfToken }}
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "duecare.fullname" . }}-secrets
                  key: hf-token
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.chat.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.chat.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.chat.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
