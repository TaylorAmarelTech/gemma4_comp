# Default values for the Duecare Helm chart.
#
# Tweak per environment via:
#   helm upgrade --install duecare ./infra/helm/duecare \
#       -f my-values.yaml --namespace duecare --create-namespace

# ---------------------------------------------------------------------------
# Image
# ---------------------------------------------------------------------------
image:
  repository: ghcr.io/tayloramareltech/duecare-llm
  tag: "latest"            # pin to a sha or vX.Y.Z in prod
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# ---------------------------------------------------------------------------
# Chat playground
# ---------------------------------------------------------------------------
chat:
  enabled: true
  replicas: 2                # bumped by HPA between minReplicas..maxReplicas
  port: 8080

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  env:
    DUECARE_LOG_LEVEL: info
    OLLAMA_HOST: http://duecare-ollama:11434
    DUECARE_OLLAMA_MODEL: gemma2:2b

  # Probes are intentionally tight — fail fast on a wedged pod
  livenessProbe:
    httpGet:
      path: /healthz
      port: 8080
    initialDelaySeconds: 15
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /healthz
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 2

# ---------------------------------------------------------------------------
# Classifier API
# ---------------------------------------------------------------------------
classifier:
  enabled: true
  replicas: 2
  port: 8080                 # internal; service maps externally

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70

  env:
    DUECARE_LOG_LEVEL: info
    OLLAMA_HOST: http://duecare-ollama:11434
    DUECARE_OLLAMA_MODEL: gemma2:2b

  livenessProbe:
    httpGet: { path: /healthz, port: 8080 }
    initialDelaySeconds: 15
    periodSeconds: 30
  readinessProbe:
    httpGet: { path: /healthz, port: 8080 }
    initialDelaySeconds: 5
    periodSeconds: 10

# ---------------------------------------------------------------------------
# Ollama (optional — disable to bring your own model server)
# ---------------------------------------------------------------------------
ollama:
  enabled: true
  image:
    repository: ollama/ollama
    tag: latest
  replicas: 1                # ollama is stateful; scale via larger pod, not more pods
  port: 11434

  # Ollama is BIG — give it real resources. CPU-only fallback works
  # for gemma2:2b but is slow (~3 sec/token). For real production,
  # request a GPU node (see `nodeSelector` below).
  resources:
    requests:
      cpu: 1000m
      memory: 4Gi
    limits:
      cpu: 4000m
      memory: 8Gi

  # Persistent model cache (otherwise Ollama re-downloads on every restart).
  persistence:
    enabled: true
    storageClass: ""         # uses cluster default
    size: 20Gi
    accessModes:
      - ReadWriteOnce

  # Pre-pull model on first start (one-shot Job)
  modelPullEnabled: true
  modelTag: gemma2:2b

  # GPU support — uncomment + set to a GPU node selector if you have one
  # nodeSelector:
  #   cloud.google.com/gke-accelerator: nvidia-tesla-t4
  # tolerations:
  #   - key: nvidia.com/gpu
  #     operator: Exists
  #     effect: NoSchedule

# ---------------------------------------------------------------------------
# Service + Ingress
# ---------------------------------------------------------------------------
service:
  type: ClusterIP            # set to LoadBalancer or NodePort for direct access

ingress:
  enabled: false             # set true + configure when you have an ingress controller
  className: nginx
  annotations: {}
  hosts:
    - host: duecare.example.com
      paths:
        - path: /
          pathType: Prefix
          service: chat      # which service to route to: chat | classifier
        - path: /api/classifier
          pathType: Prefix
          service: classifier
  tls:
    - secretName: duecare-tls
      hosts:
        - duecare.example.com

# ---------------------------------------------------------------------------
# ServiceAccount + RBAC
# ---------------------------------------------------------------------------
serviceAccount:
  create: true
  annotations: {}
  name: ""

# ---------------------------------------------------------------------------
# Pod-level
# ---------------------------------------------------------------------------
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: false   # uvicorn writes to /tmp; relaxed
  runAsNonRoot: true
  runAsUser: 1000

nodeSelector: {}
tolerations: []
affinity: {}

# ---------------------------------------------------------------------------
# Optional secrets (HF token, etc.) — populate via external-secrets,
# SOPS, or Helm --set, never hard-code here
# ---------------------------------------------------------------------------
secrets:
  hfToken: ""                # if set, mounted as HF_TOKEN env var

# ---------------------------------------------------------------------------
# Pod Disruption Budget — survives node maintenance + voluntary disruptions
# ---------------------------------------------------------------------------
podDisruptionBudget:
  enabled: true
  # Pick ONE of minAvailable or maxUnavailable. minAvailable is more
  # aggressive about keeping replicas up during a node drain.
  minAvailable: ""           # e.g. 1 or "50%"
  maxUnavailable: 1

# ---------------------------------------------------------------------------
# NetworkPolicy — default-deny ingress + egress, then explicit allows.
# Requires a CNI that enforces policies (Calico, Cilium, Antrea, etc.).
# Disable if your cluster doesn't enforce — the policy will be ignored
# safely, but it pollutes kubectl get netpol output.
# ---------------------------------------------------------------------------
networkPolicy:
  enabled: false
  # Namespaces whose pods are allowed to call into the chat service.
  # Set the kubernetes.io/metadata.name label on the namespace to
  # match. Default empty = same-namespace ingress only.
  ingressFromNamespaces: {}
  # Allow egress to public HTTPS (for cloud Ollama / OpenAI fallback /
  # research-tools internet search). Leave false for air-gapped
  # deployments.
  allowExternalHTTPS: false

# ---------------------------------------------------------------------------
# ServiceMonitor — exposes metrics to Prometheus Operator
# (kube-prometheus-stack). Disable if your monitoring is configured
# via static scrape jobs instead.
# ---------------------------------------------------------------------------
serviceMonitor:
  enabled: false
  namespace: ""              # leave empty to use the release namespace
  path: /metrics
  interval: 30s
  scrapeTimeout: 10s
  additionalLabels:
    release: kube-prometheus-stack    # kube-prometheus-stack default selector
