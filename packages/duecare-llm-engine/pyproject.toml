[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "duecare-llm-engine"
version = "0.1.0"
description = "Duecare engine: clean Python API around the multimodal-graph pipeline. Subprocess-isolated so the heavy Kaggle script stays as-is."
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
authors = [{name = "Taylor Amarel"}]
dependencies = [
    "pydantic>=2.9.0",
    "duecare-llm-evidence-db>=0.1.0",
]

[project.urls]
Homepage = "https://github.com/TaylorAmarelTech/gemma4_comp"

[tool.hatch.build.targets.wheel]
packages = ["src/duecare"]
