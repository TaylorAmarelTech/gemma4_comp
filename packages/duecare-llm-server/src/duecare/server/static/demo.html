<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Demo — Duecare</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="dc-slideshow">

  <!-- ============== Slideshow chrome (always visible) ============== -->
  <div class="dc-slide-chrome">
    <div class="dc-slide-chrome-left">
      <a href="/" class="dc-chrome-btn" title="Exit demo (Esc)">✕ Exit</a>
      <span class="dc-slide-counter"><span id="slide-num">1</span> / <span id="slide-total">13</span></span>
    </div>
    <div class="dc-slide-chrome-center">
      <div class="dc-slide-progress">
        <div id="slide-progress-bar"></div>
      </div>
    </div>
    <div class="dc-slide-chrome-right">
      <button class="dc-chrome-btn" onclick="prevSlide()" id="prev-btn" title="Previous (←)">← Prev</button>
      <button class="dc-chrome-btn" onclick="toggleAuto()" id="auto-btn" title="Auto-advance">▶ Auto</button>
      <button class="dc-chrome-btn primary" onclick="nextSlide()" id="next-btn" title="Next (→)">Next →</button>
    </div>
  </div>

  <!-- ============== Slide stage ============== -->
  <div class="dc-slide-stage" id="slide-stage">
    <!-- slides injected by JS -->
  </div>

  <!-- ============== Slide picker (clickable dots) ============== -->
  <div class="dc-slide-picker" id="slide-picker"></div>

<style>
/* ===== Slideshow shell ===== */
body.dc-slideshow {
  margin: 0; padding: 0;
  background: linear-gradient(135deg, #f8fafc 0%, #eff6ff 100%);
  min-height: 100vh;
  overflow-x: hidden;
}
body.dc-slideshow header.dc-nav { display: none !important; }

.dc-slide-chrome {
  position: fixed; top: 0; left: 0; right: 0; height: 56px;
  background: rgba(255, 255, 255, 0.92);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 18px;
  z-index: 100; gap: 14px;
}
.dc-slide-chrome-left, .dc-slide-chrome-right {
  display: flex; align-items: center; gap: 10px;
  flex: 0 0 auto;
}
.dc-slide-chrome-center {
  flex: 1; display: flex; align-items: center;
  padding: 0 12px;
}
.dc-chrome-btn {
  background: transparent; border: 1px solid var(--border);
  color: var(--ink); padding: 7px 14px; border-radius: 8px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  text-decoration: none; transition: background 120ms, border-color 120ms;
}
.dc-chrome-btn:hover { background: #f1f5f9; border-color: var(--primary); }
.dc-chrome-btn.primary {
  background: var(--primary); color: #fff; border-color: var(--primary);
}
.dc-chrome-btn.primary:hover { background: #3a5d83; border-color: #3a5d83; }
.dc-chrome-btn.active {
  background: #fef3c7; border-color: #f59e0b; color: #92400e;
}
.dc-chrome-btn:disabled {
  opacity: 0.4; cursor: not-allowed;
}
.dc-slide-counter {
  font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums;
}
.dc-slide-progress {
  width: 100%; height: 4px; background: var(--border);
  border-radius: 2px; overflow: hidden;
}
.dc-slide-progress > div {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--primary), #60a5fa);
  transition: width 200ms;
}

.dc-slide-stage {
  padding: 70px 24px 60px 24px;
  min-height: 100vh;
  display: flex; align-items: stretch; justify-content: center;
}

.dc-slide {
  display: none;
  width: 100%; max-width: 1480px;
  min-height: calc(100vh - 130px);
  background: #ffffff;
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 56px 72px 48px 72px;
  box-shadow: 0 10px 36px rgba(15, 23, 42, 0.07);
  animation: dc-slide-in 280ms ease-out;
}
.dc-slide.active { display: flex; flex-direction: column; }
@keyframes dc-slide-in {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.dc-slide h1 {
  margin: 0 0 14px 0; font-size: 42px; line-height: 1.1;
  letter-spacing: -0.025em; color: var(--ink); font-weight: 700;
}
.dc-slide .dc-slide-tag {
  display: inline-block; font-size: 12px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.09em;
  padding: 5px 12px; border-radius: 999px;
  margin-bottom: 16px;
}
.dc-slide h2 {
  font-size: 22px; margin: 26px 0 12px 0;
  color: var(--primary);
}
.dc-slide p { line-height: 1.7; font-size: 17px; }
.dc-slide ul, .dc-slide ol { line-height: 1.7; font-size: 17px; }
.dc-slide a { color: var(--primary); }
.dc-slide code {
  background: #f1f5f9; padding: 1px 6px;
  border-radius: 4px; font-size: 13px;
}
.dc-slide .dc-slide-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 14px; margin: 22px 0;
}
.dc-slide .dc-slide-stat {
  background: #f8fafc; border-left: 4px solid var(--primary);
  padding: 16px 18px; border-radius: 8px;
}
.dc-slide .dc-slide-stat .num {
  font-size: 28px; font-weight: 700; color: var(--primary);
  line-height: 1; letter-spacing: -0.02em;
}
.dc-slide .dc-slide-stat .lbl {
  font-size: 13px; color: var(--ink); margin-top: 6px;
}
.dc-slide .dc-slide-stat .lbl small {
  display: block; color: var(--muted); font-size: 11px;
  margin-top: 3px; font-style: italic;
}
.dc-slide .dc-callout {
  background: #fffbeb; border-left: 4px solid #f59e0b;
  padding: 14px 18px; border-radius: 8px; margin: 16px 0;
  font-size: 14px;
}
.dc-slide .dc-callout.info { background: #eff6ff; border-color: #3b82f6; }
.dc-slide .dc-callout.danger { background: #fef2f2; border-color: #ef4444; }
.dc-slide .dc-callout.success { background: #ecfdf5; border-color: #10b981; }
.dc-slide .dc-callout b { color: var(--ink); }

/* Slide picker (dot rail) */
.dc-slide-picker {
  position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 6px; z-index: 100;
  background: rgba(255, 255, 255, 0.92);
  backdrop-filter: blur(6px);
  padding: 8px 12px; border-radius: 999px;
  border: 1px solid var(--border);
  max-width: 90%; overflow-x: auto;
}
.dc-slide-picker .dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: #cbd5e1; cursor: pointer; border: 0;
  padding: 0; transition: transform 120ms, background 120ms;
  flex: 0 0 auto;
}
.dc-slide-picker .dot:hover { transform: scale(1.3); background: #94a3b8; }
.dc-slide-picker .dot.active {
  background: var(--primary); transform: scale(1.4);
}

/* Pipeline diagram (slide 7: Architecture) */
.dc-pipeline-grid {
  display: grid;
  grid-template-columns: 1fr 22px 1fr 22px 1fr 22px 1fr 22px 1fr;
  gap: 6px; align-items: stretch; margin: 22px 0;
}
.dc-pipe-stage {
  background: #f8fafc; border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 14px 38px 14px;
  position: relative; min-width: 0;
}
.dc-pipe-stage.gemma { border-color: var(--primary);
  background: linear-gradient(180deg, #ffffff 0%, #eff6ff 100%); }
.dc-pipe-stage .num {
  position: absolute; top: -10px; left: -10px;
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--primary); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 13px;
}
.dc-pipe-stage.gemma .num { background: #1e40af; }
.dc-pipe-stage .name { font-weight: 600; font-size: 14px; margin-bottom: 6px; }
.dc-pipe-stage .desc { font-size: 11px; color: var(--muted); line-height: 1.4; }
.dc-pipe-stage .tag {
  position: absolute; bottom: 8px; left: 14px;
  font-size: 10px; color: var(--primary); font-weight: 600;
  background: #eff6ff; padding: 2px 8px; border-radius: 999px;
  font-family: monospace;
}
.dc-pipe-arrow {
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: var(--muted);
}

/* Example slide -- input/run/result layout */
.dc-ex-layout {
  display: grid; grid-template-columns: 1fr 1fr; gap: 22px;
  margin-top: 18px;
}
.dc-ex-input-box {
  background: #fafafa; border: 1px solid var(--border);
  border-radius: 8px; padding: 14px;
  font-size: 13px; line-height: 1.5;
  font-family: ui-monospace, SFMono-Regular, monospace;
  white-space: pre-wrap; max-height: 300px; overflow: auto;
}
.dc-ex-runline {
  display: flex; align-items: center; gap: 12px;
  flex-wrap: wrap; margin: 12px 0;
}
.dc-ex-trace {
  border-left: 2px solid var(--border); padding-left: 14px;
  margin-top: 6px; max-height: 240px; overflow-y: auto;
}
.dc-ex-trace .step {
  display: grid; grid-template-columns: 60px 22px 1fr;
  gap: 10px; align-items: start; font-size: 12px;
  position: relative; margin-bottom: 6px;
}
.dc-ex-trace .step::before {
  content: ''; position: absolute; left: -19px; top: 5px;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--border); border: 2px solid #fff;
}
.dc-ex-trace .step.s-ok::before { background: #10b981; }
.dc-ex-trace .step.s-running::before { background: #3b82f6;
  animation: dc-pulse 1.4s ease-in-out infinite; }
.dc-ex-trace .step.s-fail::before { background: #ef4444; }
.dc-ex-trace .step.s-fallback::before { background: #f59e0b; }
.dc-ex-trace .step .t-time {
  font-family: monospace; color: var(--muted); font-size: 11px;
}
.dc-ex-trace .step .t-tag {
  font-size: 10px; padding: 1px 6px; border-radius: 3px;
  text-transform: uppercase; font-weight: 700; text-align: center;
  background: #d1fae5; color: #065f46;
}
.dc-ex-trace .step.s-running .t-tag { background: #dbeafe; color: #1e40af; }
.dc-ex-trace .step.s-fail .t-tag { background: #fee2e2; color: #991b1b; }
.dc-ex-trace .step .t-name { font-weight: 600; }
.dc-ex-trace .step .t-detail {
  color: var(--muted); margin-top: 2px; font-size: 11px;
  word-break: break-word;
}
.dc-ex-verdict {
  background: #f8fafc; border-radius: 8px; padding: 16px;
  margin-top: 12px;
}
.dc-ex-verdict-line {
  display: flex; align-items: center; gap: 10px;
  flex-wrap: wrap; margin-bottom: 10px;
}
.dc-ex-explain {
  background: #f8fafc; border-left: 4px solid var(--primary);
  border-radius: 6px; padding: 12px 16px; margin: 10px 0;
  font-size: 13px;
}
.dc-ex-explain b { color: var(--ink); }
.dc-ex-evidence-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 8px; margin-top: 10px;
}
.dc-ex-evidence-grid img {
  width: 100%; display: block; border-radius: 6px;
  border: 1px solid var(--border);
}

/* Title-slide audience row */
.dc-audience-row {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px;
  margin: 26px 0 0 0;
}

/* Why-Gemma 2-column layout */
.dc-twocol-layout {
  display: grid; grid-template-columns: 1fr 1fr; gap: 22px;
  margin: 18px 0;
}
.dc-twocol-card {
  border-radius: 12px; padding: 20px 22px;
}
.dc-twocol-card.good { background: #ecfdf5; border: 1px solid #10b981; }
.dc-twocol-card.warn { background: #fffbeb; border: 1px solid #f59e0b; }
.dc-twocol-card ul { margin: 0; padding-left: 20px; font-size: 14px; line-height: 1.55; }
.dc-twocol-card li { margin-bottom: 8px; }
.dc-bench-row {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  margin: 12px 0; padding: 12px; background: #fff;
  border: 1px solid var(--border); border-radius: 8px;
}
.dc-bench-row .bn {
  font-size: 26px; font-weight: 800; color: #92400e;
  text-align: center; line-height: 1;
}
.dc-bench-row .bl {
  font-size: 11px; color: var(--muted); text-align: center;
  margin-top: 4px;
}
.dc-aud {
  background: #f8fafc; border: 1px solid var(--border);
  border-radius: 12px; padding: 16px;
}
.dc-aud-icon {
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; margin-bottom: 10px;
}
.dc-aud-name { font-weight: 700; font-size: 14px; color: var(--ink); margin-bottom: 4px; }
.dc-aud-desc { font-size: 12px; color: var(--muted); line-height: 1.45; }

/* Two-column problem layout (text + side photos) */
.dc-split-layout {
  display: grid; grid-template-columns: 1.15fr 1fr;
  gap: 32px; align-items: start;
}
.dc-side-photo-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.dc-side-photo-grid img {
  width: 100%; aspect-ratio: 1/1; object-fit: cover;
  border-radius: 8px; border: 1px solid var(--border);
}

/* Social-media platform grid */
.dc-platform-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 12px; margin: 22px 0;
}
.dc-platform {
  background: #fff; border: 1px solid var(--border);
  border-left: 4px solid var(--danger); border-radius: 10px;
  padding: 14px 16px;
}
.dc-pf-name { font-weight: 700; font-size: 16px; color: var(--ink); margin-bottom: 6px; }
.dc-pf-detail { font-size: 13px; color: var(--muted); line-height: 1.5; }

/* "This is NOT okay" gallery */
.dc-not-okay-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 14px; margin: 8px 0;
}
.dc-not-okay-grid .dc-not-okay-tile {
  position: relative; aspect-ratio: 4/5;
  background: #f1f5f9; border-radius: 10px;
  border: 1px solid var(--border); overflow: hidden;
}
.dc-not-okay-grid .dc-not-okay-tile img {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.dc-not-okay-grid .dc-not-okay-caption {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.85) 100%);
  color: #fff; padding: 16px 12px 10px 12px;
  font-size: 11px; font-weight: 600; line-height: 1.35;
}

/* Picker (demo chooser) */
.dc-picker-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 14px; margin-top: 22px;
}
.dc-picker-card {
  text-align: left; background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px 18px; cursor: pointer;
  font-family: inherit; color: inherit; text-decoration: none;
  display: block; transition: transform 120ms, border-color 120ms,
                              box-shadow 160ms;
}
.dc-picker-card:hover {
  transform: translateY(-2px); border-color: var(--primary);
  box-shadow: 0 6px 18px rgba(76,120,168,0.12);
}
.dc-picker-card.dc-picker-allcard {
  background: linear-gradient(135deg, #ffffff 0%, #eff6ff 100%);
  border-color: #ddd6fe;
}
.dc-picker-card .dc-pick-tag {
  display: inline-block; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.07em;
  padding: 3px 8px; border-radius: 999px; margin-bottom: 8px;
}
.dc-picker-card .dc-pick-title {
  font-size: 15px; font-weight: 600; color: var(--ink);
  line-height: 1.35; margin-bottom: 6px;
}
.dc-picker-card .dc-pick-desc {
  font-size: 13px; color: var(--muted); line-height: 1.5;
  margin-bottom: 8px;
}
.dc-picker-card .dc-pick-meta {
  font-size: 11px; color: var(--primary); font-family: monospace;
}

/* Mobile */
@media (max-width: 1100px) {
  .dc-pipeline-grid { grid-template-columns: 1fr; }
  .dc-pipe-arrow { transform: rotate(90deg); padding: 4px 0; }
  .dc-platform-grid { grid-template-columns: 1fr 1fr; }
  .dc-not-okay-grid { grid-template-columns: 1fr 1fr; }
  .dc-audience-row { grid-template-columns: repeat(3, 1fr); }
  .dc-split-layout { grid-template-columns: 1fr; }
  .dc-twocol-layout { grid-template-columns: 1fr; }
}
@media (max-width: 800px) {
  .dc-slide-stage { padding: 70px 12px 60px 12px; }
  .dc-slide {
    padding: 28px 22px; min-height: calc(100vh - 130px);
  }
  .dc-slide h1 { font-size: 28px; }
  .dc-slide p, .dc-slide ul, .dc-slide ol { font-size: 15px; }
  .dc-platform-grid { grid-template-columns: 1fr; }
  .dc-audience-row { grid-template-columns: 1fr; }
  .dc-not-okay-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .dc-ex-layout { grid-template-columns: 1fr; }
  .dc-slide-chrome-center { display: none; }
  .dc-chrome-btn { padding: 6px 10px; font-size: 12px; }
  .dc-slide-picker { padding: 6px 10px; }
  .dc-slide-picker .dot { width: 8px; height: 8px; }
}
</style>

<script>
// ===== Slide content =====
// Each slide is a function returning HTML. The current slide is rendered
// into #slide-stage. Examples that auto-run carry a `task_type` so the
// 'Run' button can submit them through the queue and stream the trace
// inline below the input.

const ALL_SLIDES = [
  // ----------------------------------------------------------------
  // Slide 1 -- Title
  // ----------------------------------------------------------------
  {
    id: 'title',
    tag: 'Overview',
    tagBg: '#eff6ff', tagFg: '#1e40af',
    title: 'A Gemma 4 implementation against human exploitation.',
    autoSec: 12,
    body: `
<p style="font-size:20px;line-height:1.55;color:var(--muted);margin-top:8px;max-width:900px">
Duecare flags exploitation and abuse patterns in
<b>recruiter ads, chat messages, contracts, complaint letters,</b>
and <b>bulk case files</b> — and writes every step of the reasoning
to an audit trail.
</p>
<div class="dc-audience-row">
  <div class="dc-aud"><div class="dc-aud-icon" style="background:#dbeafe;color:#1e40af">⚡</div>
    <div class="dc-aud-name">Social-media platforms</div>
    <div class="dc-aud-desc">moderation queues, transparency reports under CA AB 587 / Texas HB 20</div></div>
  <div class="dc-aud"><div class="dc-aud-icon" style="background:#fef3c7;color:#92400e">🛡</div>
    <div class="dc-aud-name">NGOs &amp; hotlines</div>
    <div class="dc-aud-desc">Polaris, IJM, ECPAT, HRD Nepal — bulk case triage</div></div>
  <div class="dc-aud"><div class="dc-aud-icon" style="background:#fef2f2;color:#991b1b">⚖</div>
    <div class="dc-aud-name">Government &amp; regulators</div>
    <div class="dc-aud-desc">DOL, BP2MI, MOM, MOHRE, FET — license &amp; statute enforcement</div></div>
  <div class="dc-aud"><div class="dc-aud-icon" style="background:#ecfdf5;color:#065f46">👤</div>
    <div class="dc-aud-name">Individuals</div>
    <div class="dc-aud-desc">workers &amp; families — self-check a suspicious offer or message</div></div>
  <div class="dc-aud"><div class="dc-aud-icon" style="background:#f5f3ff;color:#5b21b6">🔬</div>
    <div class="dc-aud-name">Researchers</div>
    <div class="dc-aud-desc">benchmarking, fine-tuning, policy work</div></div>
</div>
<p style="font-size:13px;color:var(--muted);margin-top:auto;padding-top:24px">
Press <code>→</code> · <b>Next</b> to advance · <code>▶ Auto</code> to
self-advance · <code>Esc</code> to exit.
</p>`
  },

  // ----------------------------------------------------------------
  // Slide 2 -- The problem
  // ----------------------------------------------------------------
  {
    id: 'problem',
    tag: 'The problem',
    tagBg: '#fef2f2', tagFg: '#991b1b',
    title: 'Exploitation at scale, in plain language.',
    autoSec: 14,
    body: `
<div class="dc-split-layout">
  <div>
    <p style="font-size:18px">
    The most common forms of human exploitation —
    <b>passport confiscation, debt bondage, fee fraud, document
    substitution, doxxing for debt collection, intimate-image
    coercion, kafala-era "safekeeping"</b> — are
    <b>linguistically detectable</b> in the ads, chats, and contracts
    that put people into those situations.
    </p>
    <div class="dc-slide-stats" style="grid-template-columns:1fr 1fr">
      <div class="dc-slide-stat">
        <div class="num">27.6M</div>
        <div class="lbl">in forced labour worldwide
          <small>(ILO + IOM, 2022)</small></div>
      </div>
      <div class="dc-slide-stat">
        <div class="num">169M</div>
        <div class="lbl">international migrant workers
          <small>(ILO, 2021)</small></div>
      </div>
      <div class="dc-slide-stat">
        <div class="num">~$5,250</div>
        <div class="lbl">avg recruitment-fee debt per worker
          <small>(IOM &amp; IFC, 2017)</small></div>
      </div>
      <div class="dc-slide-stat">
        <div class="num">$236B</div>
        <div class="lbl">annual profit from forced labour
          <small>(ILO, 2024)</small></div>
      </div>
    </div>
  </div>
  <div>
    <h2 style="margin-top:0">What it looks like</h2>
    <div id="slide-problem-grid" class="dc-side-photo-grid">
      <div style="grid-column:1/-1;color:var(--muted);font-size:13px">Loading redacted samples…</div>
    </div>
    <p style="font-size:12px;color:var(--muted);margin-top:10px;font-style:italic">
    Public-record posts. Heavily redacted: faces blurred, names
    erased, identifying details removed. The pattern remains
    visible, the individual cannot be re-identified.
    </p>
  </div>
</div>`,
    onShow: () => loadProblemPhotos(),
  },

  // ----------------------------------------------------------------
  // Slide 3 -- Where it starts (social media + messaging apps)
  // ----------------------------------------------------------------
  {
    id: 'social_media',
    tag: 'Where it starts',
    tagBg: '#fef2f2', tagFg: '#991b1b',
    title: 'It starts on social media.',
    autoSec: 14,
    body: `
<p style="font-size:18px;max-width:900px">

<p>
The Content Moderation Transparency Act forces platforms with
revenue over $100M to publicly report what content categories
they detect, how, and at what rate — including trafficking-
adjacent content. Vague "we use AI" is no longer a defence.
</p>
<h2>Cal. Civ. Code § 1714(a) negligence verdicts (2024-2026)</h2>
<p>
Civil juries applying the duty-of-care standard have found
platforms liable for <i>defective design</i> when their
recommendation systems amplified content that injured a known
vulnerable population. The doctrine has expanded from suicide-
ideation cases (Bonta v. Meta line) toward broader exploitation
patterns.
</p>
<h2>Texas HB 20 (2021, upheld by 5th Circuit)</h2>
<p>

rationales — raising the bar for explainable AI in moderation
pipelines.
</p>

KB hit, every tool call, every heuristic match recorded) is
designed for exactly that audit trail.

    body: `
<p>
Every input to Duecare runs through this exact sequence. The
trace timeline you'll see on the example slides is generated
live by these stages.
</p>
<div class="dc-pipeline-grid">
  <div class="dc-pipe-stage">
    <div class="num">1</div>
    <div class="name">Heuristic prescan</div>
    <div class="desc">22 keyword signals across 3 tiers.
      Multilingual: English, Tagalog, Bahasa, Hindi, Bengali,
      Nepali, Arabic transliteration. Establishes the severity floor.</div>
    <div class="tag">≈ 5 ms · CPU</div>
  </div>
  <div class="dc-pipe-arrow">→</div>
  <div class="dc-pipe-stage">
    <div class="num">2</div>
    <div class="name">GREP knowledge base</div>
    <div class="desc">Regex match against 53 curated passages
      (statutes, conventions, ILO indicators) across 18+
      jurisdictions. Always works, fully explainable.</div>
    <div class="tag">≈ 20 ms · CPU</div>
  </div>
  <div class="dc-pipe-arrow">→</div>
  <div class="dc-pipe-stage">
    <div class="num">3</div>
    <div class="name">RAG retrieval</div>
    <div class="desc">sentence-transformers MiniLM → cosine top-K
      against the same KB. Catches paraphrases + cross-language
      semantic matches GREP misses.</div>
    <div class="tag">≈ 200 ms · CPU</div>
  </div>
  <div class="dc-pipe-arrow">→</div>
  <div class="dc-pipe-stage">
    <div class="num">4</div>
    <div class="name">Tool calls</div>
    <div class="desc">11 deterministic tools fire every run:
      lookup_statute, lookup_hotline, check_agency_license,
      calculate_max_fee, identify_ilo_indicators, lookup_embassy,
      check_predatory_lender, etc.</div>
    <div class="tag">≈ 5 ms · CPU</div>
  </div>
  <div class="dc-pipe-arrow">→</div>
  <div class="dc-pipe-stage gemma">
    <div class="num">5</div>
    <div class="name">Gemma 4 classify</div>
    <div class="desc">Receives input + heuristic findings + KB
      hits + severity-anchor table + tool results. Returns
      BLOCK / REVIEW / PASS with reasoning. Multimodal-capable
      (image + text in one model).</div>
    <div class="tag">≈ 8-18 s · GPU</div>
  </div>
</div>
<h2>Why this layering wins</h2>
<p>
Each stage catches what the others miss:
<b>Heuristic</b> = brittle but fast and explainable.
<b>GREP</b> = vocabulary-bound but auditable.
<b>RAG</b> = covers paraphrase but can drift.
<b>Tools</b> = compute the things RAG can't (fee caps, licence
status, embassy contacts). <b>Gemma</b> = synthesises everything
into a verdict + reasoning a human can act on.
</p>
<div class="dc-callout success">
<b>Output is JSON.</b> verdict + severity (max of gemma vs heuristic
floor) + matched_signals + kb_hits + tool_calls + ilo_indicators +
fee_cap + license_check + embassy + known_actors + hotline +
suggested_complaint_template. Every field is auditable.
</div>`

// ===== Mode detection — filter ALL_SLIDES into SLIDES based on URL =====
const _MODE = (() => {
  const path = window.location.pathname;
  const params = new URLSearchParams(window.location.search);
  if (path === '/overview') return 'overview';
  if (params.get('play') === 'all') return 'all';
  const showOne = params.get('show');
  if (showOne) return 'one:' + showOne;
  return 'picker';  // default for /demo
})();

const _OVERVIEW_IDS = new Set([
  'title', 'problem', 'social_media', 'legal', 'not_okay',
  'why_gemma', 'architecture', 'closing'
]);
const _EXAMPLE_IDS = new Set([
  'ex_jobboard', 'ex_worker', 'ex_ngo', 'ex_doxxing', 'ex_kafala'
]);

const SLIDES = (() => {
  if (_MODE === 'overview') {
    return ALL_SLIDES.filter(s => _OVERVIEW_IDS.has(s.id));
  }
  if (_MODE === 'all') {
    return ALL_SLIDES.filter(s => _EXAMPLE_IDS.has(s.id) || s.id === 'closing');
  }
  if (_MODE.startsWith('one:')) {
    const showId = _MODE.split(':')[1];
    return ALL_SLIDES.filter(s => s.id === showId || s.id === 'closing');
  }
  // 'picker' (default for /demo): picker first, then examples, then closing
  return ALL_SLIDES.filter(
    s => s.id === 'picker' || _EXAMPLE_IDS.has(s.id) || s.id === 'closing'
  );
})();

function gotoSlideById(id) {
  const idx = SLIDES.findIndex(s => s.id === id);
  if (idx >= 0) gotoSlide(idx);
}

// ===== Slideshow controller =====
let _curSlide = 0;
let _autoTimer = null;
let _isAuto = false;

function _renderSlide(i) {
  const s = SLIDES[i];
  const stage = document.getElementById('slide-stage');

  let html = `<div class="dc-slide active" id="slide-${s.id}">`;
  html += `<span class="dc-slide-tag" style="background:${s.tagBg};color:${s.tagFg}">${s.tag}</span>`;
  html += `<h1>${s.title}</h1>`;
  if (s.isExample) {
    html += _exampleSlideBody(s);
  } else if (s.body) {
    html += s.body;
  }
  html += `</div>`;

  stage.innerHTML = html;

  // Update chrome
  document.getElementById('slide-num').innerText = (i + 1).toString();
  document.getElementById('slide-total').innerText = SLIDES.length.toString();
  const pct = ((i + 1) / SLIDES.length) * 100;
  document.getElementById('slide-progress-bar').style.width = pct + '%';

  // Update picker
  document.querySelectorAll('.dc-slide-picker .dot').forEach((d, idx) => {
    d.classList.toggle('active', idx === i);
  });

  // Update prev/next disabled state
  document.getElementById('prev-btn').disabled = (i === 0);
  document.getElementById('next-btn').disabled = (i === SLIDES.length - 1);

  // Run any onShow hook
  if (s.onShow) try { s.onShow(); } catch (e) {}

  // If example slide, kick off the run automatically
  if (s.isExample) {
    setTimeout(() => _runExampleInSlide(s), 600);
  }

  // Scroll stage to top
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function _exampleSlideBody(s) {
  return `
<p style="font-size:15px;color:var(--muted);margin-top:6px">
Expected: <b>${s.expected}</b> · locale: <code>${s.locale}</code> ·
task_type: <code>${s.task_type}</code>
</p>
<div class="dc-ex-layout">
  <div>
    <h2>Input</h2>
    <div class="dc-ex-input-box">${s.text}</div>
    <div class="dc-ex-runline">
      <button class="dc-chrome-btn primary" id="ex-run-${s.id}"
        onclick="_runExampleInSlide(SLIDES.find(x=>x.id==='${s.id}'))">▶ Run through pipeline</button>
      <span id="ex-status-${s.id}" style="font-size:12px;color:var(--muted)"></span>
    </div>
    <div class="dc-progress" style="margin-top:8px">
      <div id="ex-bar-${s.id}"></div>
    </div>
    <h2>Pipeline trace</h2>
    <div id="ex-trace-${s.id}" class="dc-ex-trace">
      <p style="color:var(--muted);font-size:12px;margin:0">(awaiting run)</p>
    </div>
  </div>
  <div>
    <h2>Verdict</h2>
    <div id="ex-verdict-${s.id}" class="dc-ex-verdict">
      <p style="color:var(--muted);font-size:12px;margin:0">(awaiting run)</p>
    </div>
    <h2>Why this matters</h2>
    ${(s.explain || []).map(([t, b]) =>
      `<div class="dc-ex-explain"><b>${t}.</b> ${b}</div>`).join('')}
  </div>
</div>`;
}

const STAGE_NARRATION = {
  input_check:        'Input received and routed into the queue.',
  heuristic_prescan:  'Stage 1: 22 keyword signals run in <5 ms.',
  grep_kb:            'Stage 2: regex match against 53 KB passages.',
  rag_kb:             'Stage 3: sentence-transformer cosine top-K.',
  tool_calls:         'Stage 4: 11 deterministic tools fire.',
  gemma_classify:     'Stage 5: Gemma 4 with anchor table + KB hits.',
  gemma_advise:       'Stage 5: Gemma 4 plain-language advice + hotline.',
  complaint_suggestion: 'Bonus: matches a complaint template for the verdict.',
  done:               'Final JSON: verdict, severity, evidence, hotline.',
};

async function _runExampleInSlide(s) {
  if (!s || s._running) return;
  s._running = true;
  document.getElementById('ex-status-' + s.id).innerText = 'submitting…';
  document.getElementById('ex-bar-' + s.id).style.width = '0%';
  document.querySelector('#slide-' + s.id + ' .dc-progress').classList.add('indeterminate');
  document.getElementById('ex-trace-' + s.id).innerHTML = '';
  document.getElementById('ex-verdict-' + s.id).innerHTML =
    '<p style="color:var(--muted);font-size:12px;margin:0">(running…)</p>';

  let submitJ;
  try {
    const r = await fetch('/api/queue/submit', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({task_type: s.task_type,
                              payload: {text: s.text, locale: s.locale}})
    });
    submitJ = await r.json();
  } catch (e) {
    document.getElementById('ex-status-' + s.id).innerText = 'submit error: ' + e;
    s._running = false; return;
  }
  document.getElementById('ex-status-' + s.id).innerText = '#' + submitJ.task_id;
  const t0 = Date.now();
  while (true) {
    let task;
    try { task = await (await fetch('/api/queue/status/' + submitJ.task_id)).json(); }
    catch (e) {
      document.getElementById('ex-status-' + s.id).innerText = 'poll err';
      s._running = false; return;
    }
    const elapsed = ((Date.now() - t0) / 1000).toFixed(1);
    document.getElementById('ex-status-' + s.id).innerText =
      `${task.status} · ${elapsed}s`;
    _renderExampleTrace(s.id, task.trace || []);
    if (task.status === 'completed') {
      document.querySelector('#slide-' + s.id + ' .dc-progress').classList.remove('indeterminate');
      document.getElementById('ex-bar-' + s.id).style.width = '100%';
      _renderExampleVerdict(s.id, task.result, s.task_type);
      s._running = false; return;
    } else if (task.status === 'failed') {
      document.querySelector('#slide-' + s.id + ' .dc-progress').classList.remove('indeterminate');
      document.getElementById('ex-bar-' + s.id).style.width = '100%';
      document.getElementById('ex-verdict-' + s.id).innerHTML =
        '<p style="color:#991b1b">FAILED: ' + (task.error || 'unknown') + '</p>';
      s._running = false; return;
    }
    await new Promise(r => setTimeout(r, 400));
  }
}

function _renderExampleTrace(slideId, trace) {
  if (!trace.length) return;
  const el = document.getElementById('ex-trace-' + slideId);
  let html = '';
  for (const stp of trace) {
    const cls = 's-' + (stp.status || 'ok');
    const t = (stp.elapsed_since_start != null
                ? '+' + stp.elapsed_since_start.toFixed(2) + 's' : '');
    const narration = STAGE_NARRATION[stp.name];
    html += `<div class="step ${cls}">` +
      `<span class="t-time">${t}</span>` +
      `<span class="t-tag">${(stp.status||'ok').slice(0,4)}</span>` +
      `<div><div class="t-name">${stp.name}</div>` +
      (stp.detail ? `<div class="t-detail">${stp.detail}</div>` : '') +
      (narration ? `<div class="t-detail" style="color:#1e40af;` +
                       `margin-top:3px;font-style:italic">${narration}</div>` : '') +
      `</div></div>`;
  }
  el.innerHTML = html;
}

function _renderExampleVerdict(slideId, result, taskType) {
  if (!result) return;
  const el = document.getElementById('ex-verdict-' + slideId);
  let html = '<div class="dc-ex-verdict-line">';
  if (taskType === 'moderate') {
    const v = (result.verdict || 'review').toLowerCase();
    html += `<span class="dc-badge ${v}">${v.toUpperCase()}</span>`;
    html += `<span><b>severity ${result.severity || 0}/10</b></span>`;
    html += `<span class="dc-pill ${result.mode === 'gemma' ? 'ok' : ''}">${result.mode || 'heuristic'}</span>`;
  } else {
    html += `<span><b>Severity ${result.severity || 0}/10</b></span>`;
    html += `<span class="dc-pill ${result.mode === 'gemma' ? 'ok' : ''}">${result.mode || 'heuristic'}</span>`;
  }
  html += '</div>';
  if (result.reasoning) {
    html += `<p style="margin:6px 0;font-size:13px">${result.reasoning}</p>`;
  } else if (result.advice) {
    html += `<p style="margin:6px 0;font-size:13px">${result.advice}</p>`;
  }
  // KB hits
  if (result.kb_hits && result.kb_hits.length) {
    html += `<div style="margin-top:8px;font-size:11px;color:var(--muted)">` +
      `<b>KB hits (${result.kb_hits.length}):</b> ` +
      result.kb_hits.slice(0, 5).map(h => `<code>${h.id}</code>`).join(' ') +
      `</div>`;
  }
  // Tool calls
  if (result.tool_calls && result.tool_calls.length) {
    html += `<div style="margin-top:6px;font-size:11px;color:var(--muted)">` +
      `<b>Tools fired (${result.tool_calls.length}):</b> ` +
      [...new Set(result.tool_calls.map(c => c.tool))].join(', ') +
      `</div>`;
  }
  // Hotline
  if (result.hotline) {
    html += `<div style="margin-top:8px;background:#ecfdf5;padding:8px 12px;` +
      `border-radius:6px;font-size:13px"><b>Hotline:</b> ` +
      `${result.hotline.name} — <code>${result.hotline.contact}</code></div>`;
  }
  // Suggested complaint
  if (result.suggested_complaint_template) {
    const sc = result.suggested_complaint_template;
    html += `<div style="margin-top:8px;background:#eff6ff;padding:8px 12px;` +
      `border-radius:6px;font-size:13px"><b>Next step:</b> use template ` +
      `<code>${sc.slug}</code> — ${sc.reason}</div>`;
  }
  el.innerHTML = html;
}

async function _loadEvidenceManifest() {
  try { return await (await fetch('/static/evidence/manifest.json')).json(); }
  catch (e) { return { items: [] }; }
}

async function loadSlideEvidence() {
  const grid = document.getElementById('slide-evidence-grid');
  if (!grid) return;
  const m = await _loadEvidenceManifest();
  const items = (m.items || []).filter(it => it.kind === 'image');
  const picks = [
    ...items.filter(it => it.id.startsWith('imgur_')),
    ...items.filter(it => /_f02$/.test(it.id)),
  ].slice(0, 9);
  grid.innerHTML = picks.map(it =>
    `<a href="/evidence" style="display:block">` +
    `<img src="/static/evidence/${it.filename}" alt="${it.title}">` +
    `</a>`).join('');
}

async function loadProblemPhotos() {
  const grid = document.getElementById('slide-problem-grid');
  if (!grid) return;
  const m = await _loadEvidenceManifest();
  const items = (m.items || []).filter(it => it.kind === 'image');
  // 4 representative tiles: 2 imgur, 2 FB lender posts
  const imgur = items.filter(it => it.id.startsWith('imgur_')).slice(0, 2);
  const fb = items.filter(it => /drive_fb_/.test(it.filename || '')).slice(0, 2);
  const picks = [...imgur, ...fb].slice(0, 4);
  if (!picks.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;color:var(--muted);' +
      'font-size:13px">(no evidence loaded — open /evidence)</div>';
    return;
  }
  grid.innerHTML = picks.map(it =>
    `<a href="/evidence">` +
    `<img src="/static/evidence/${it.filename}" alt="${it.title || 'redacted'}">` +
    `</a>`).join('');
}

async function loadNotOkayPhotos() {
  const grid = document.getElementById('slide-notokay-grid');
  if (!grid) return;
  const m = await _loadEvidenceManifest();
  const items = (m.items || []).filter(it => it.kind === 'image');
  // Curated 4-tile set with named patterns
  const picks = [
    {match: /imgur_/,                tag: 'Wanted-poster doxxing'},
    {match: /drive_fb_(bank|hong|hk|carry|hoya)/i, tag: 'Predatory-lender shaming'},
    {match: /drive_fb_(asia|asean|express|finance|credit|cash|loan|elend)/i, tag: 'Online-lending fraud'},
    {match: /drive_fb_(agency|recruit|placement|ample|good_hope|honour|jan_2020)/i, tag: 'Recruitment fraud / blacklist'},
  ];
  const html = picks.map(p => {
    const it = items.find(x => p.match.test(x.id) || p.match.test(x.filename || ''));
    if (!it) return '';
    return `<a href="/evidence" class="dc-not-okay-tile">` +
      `<img src="/static/evidence/${it.filename}" alt="${it.title || p.tag}">` +
      `<div class="dc-not-okay-caption">${p.tag}</div></a>`;
  }).filter(Boolean).join('');
  grid.innerHTML = html || '<div style="grid-column:1/-1;color:var(--muted);' +
    'font-size:13px;text-align:center;padding:40px">(no evidence loaded — open /evidence)</div>';
}

// ===== Navigation =====
function nextSlide() {
  if (_curSlide < SLIDES.length - 1) {
    _curSlide++;
    _renderSlide(_curSlide);
  }
}
function prevSlide() {
  if (_curSlide > 0) {
    _curSlide--;
    _renderSlide(_curSlide);
  }
}
function gotoSlide(i) {
  if (i >= 0 && i < SLIDES.length) {
    _curSlide = i;
    _renderSlide(_curSlide);
  }
}

function toggleAuto() {
  _isAuto = !_isAuto;
  const btn = document.getElementById('auto-btn');
  if (_isAuto) {
    btn.classList.add('active');
    btn.innerText = '⏸ Pause';
    _scheduleAutoAdvance();
  } else {
    btn.classList.remove('active');
    btn.innerText = '▶ Auto';
    if (_autoTimer) clearTimeout(_autoTimer);
  }
}

function _scheduleAutoAdvance() {
  if (!_isAuto) return;
  if (_autoTimer) clearTimeout(_autoTimer);
  const s = SLIDES[_curSlide];
  // Skip auto-advance entirely on slides with autoSec === null (picker).
  if (s.autoSec === null) return;
  const delaySec = s.isExample ? 35 : (s.autoSec || 12);
  _autoTimer = setTimeout(() => {
    if (_curSlide < SLIDES.length - 1) {
      nextSlide();
      _scheduleAutoAdvance();
    } else {
      _isAuto = false;
      const btn = document.getElementById('auto-btn');
      btn.classList.remove('active');
      btn.innerText = '▶ Auto';
    }
  }, delaySec * 1000);
}

// Re-schedule auto on any user navigation
const _origRender = _renderSlide;
_renderSlide = function(i) {
  _origRender(i);
  if (_isAuto) _scheduleAutoAdvance();
};

// ===== Keyboard shortcuts =====
document.addEventListener('keydown', e => {
  // Ignore when focused in input/textarea
  const tag = (e.target.tagName || '').toUpperCase();
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextSlide(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
  else if (e.key === 'Escape') { window.location = '/'; }
  else if (e.key === 'Home') { gotoSlide(0); }
  else if (e.key === 'End') { gotoSlide(SLIDES.length - 1); }
});

// ===== Build picker =====
function _buildPicker() {
  const p = document.getElementById('slide-picker');
  let html = '';
  for (let i = 0; i < SLIDES.length; i++) {
    html += `<button class="dot" onclick="gotoSlide(${i})" ` +
      `title="Slide ${i+1}: ${SLIDES[i].tag}"></button>`;
  }
  p.innerHTML = html;
}

// ===== Init =====
_buildPicker();
_renderSlide(0);
