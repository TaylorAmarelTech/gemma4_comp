[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "duecare-llm-server"
version = "0.1.0"
description = "FastAPI server exposing the Duecare engine + evidence DB. Card-style homepage with four sub-apps (Enterprise compliance, Individual chatbot, Knowledge / NGO insights, Settings). Built-in cloudflared / ngrok tunnel for Kaggle-hosted demos."
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
authors = [{name = "Taylor Amarel"}]
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn>=0.30.0",
    "pydantic>=2.9.0",
    "duecare-llm-evidence-db>=0.1.0",
    "duecare-llm-engine>=0.1.0",
    "duecare-llm-nl2sql>=0.1.0",
    "duecare-llm-research-tools>=0.1.0",
    "duecare-llm-benchmark>=0.1.0",
]

# Optional. Enables /metrics + per-tenant counters / histograms.
# Install with: pip install duecare-llm-server[observability]
[project.optional-dependencies]
observability = [
    "prometheus-client>=0.20.0",
]
otel = [
    "opentelemetry-api>=1.27.0",
    "opentelemetry-sdk>=1.27.0",
    "opentelemetry-exporter-otlp>=1.27.0",
    "opentelemetry-instrumentation-fastapi>=0.48b0",
]

[project.urls]
Homepage = "https://github.com/TaylorAmarelTech/gemma4_comp"

[tool.hatch.build.targets.wheel]
packages = ["src/duecare"]
include = [
    "src/duecare/server/static/**/*",
]
