[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "duecare-llm"
version = "0.1.0"
description = "Duecare - agentic, universal LLM safety harness. Meta-package that pulls in every Duecare component and exposes the `duecare` CLI."
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
authors = [{name = "Taylor Amarel"}]
keywords = ["llm", "safety", "gemma", "duecare", "agentic"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "duecare-llm-core>=0.1.0,<0.2.0",
    "duecare-llm-models>=0.1.0,<0.2.0",
    "duecare-llm-domains>=0.1.0,<0.2.0",
    "duecare-llm-tasks>=0.1.0,<0.2.0",
    "duecare-llm-agents>=0.1.0,<0.2.0",
    "duecare-llm-workflows>=0.1.0,<0.2.0",
    "duecare-llm-publishing>=0.1.0,<0.2.0",
    "typer>=0.12.0",
    "rich>=13.0.0",
]

[project.optional-dependencies]
all = [
    "duecare-llm-models[all]",
    "duecare-llm-tasks[anonymization,embedding]",
    "duecare-llm-agents[trainer]",
    "duecare-llm-publishing[all]",
]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "ruff>=0.8.0",
    "mypy>=1.13.0",
]

[project.scripts]
duecare = "duecare.cli:main"
forge = "duecare.cli:main"


[project.urls]
Homepage = "https://github.com/TaylorAmarelTech/gemma4_comp"
Documentation = "https://github.com/TaylorAmarelTech/gemma4_comp/blob/main/docs/the_forge.md"
Issues = "https://github.com/TaylorAmarelTech/gemma4_comp/issues"
Repository = "https://github.com/TaylorAmarelTech/gemma4_comp"

[tool.hatch.build.targets.wheel]
packages = ["src/duecare"]

[tool.hatch.build.targets.wheel.shared-data]
"PURPOSE.md" = "PURPOSE.md"
"AGENTS.md" = "AGENTS.md"

[tool.hatch.build.targets.sdist]
include = [
    "src/**/*.py",
    "src/**/*.md",
    "src/**/*.yaml",
    "src/**/*.yml",
    "src/**/*.json",
    "tests/**/*.py",
    "README.md",
    "PURPOSE.md",
    "AGENTS.md",
    "pyproject.toml",
]
