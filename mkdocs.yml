          - 002 Folder-per-module: adr/002-folder-per-module-pattern.md
          - 003 On-device default: adr/003-on-device-default-cloud-opt-in.md
          - 004 6+5 notebook shape: adr/004-six-plus-five-notebook-shape.md
          - 005 Tenant id from edge proxy: adr/005-tenant-id-from-edge-proxy.md
  - Enterprise considerations:
      - Index: considerations/README.md
      - Enterprise readiness: considerations/enterprise_readiness.md
      - SLO: considerations/SLO.md
      - Runbook: considerations/runbook.md
      - Multi-tenancy: considerations/multi_tenancy.md
      - Threat model: considerations/THREAT_MODEL.md
      - Compliance: considerations/COMPLIANCE.md
      - Vendor questionnaire: considerations/vendor_questionnaire.md
      - Capacity planning: considerations/capacity_planning.md
  - Outreach:
      - Press kit: press_kit.md
      - Educator resources: educator_resources.md
      - Comparison vs alternatives: comparison_to_alternatives.md
      - First-deployer feedback: first_deployer_feedback.md
      - FAQ: FAQ.md
  - Research:
      - Harness lift report: harness_lift_report.md
      - Project phases: project_phases.md
      - Cloud deployment: cloud_deployment.md
