      - Pick a deployment shape: deployment_topologies.md
      - Pick a Gemma 4 variant: gemma4_model_guide.md
      - Local install: deployment_local.md
      - Cloud deploy (13 platforms): cloud_deployment.md
      - Container guide: containers.md
  - Scenarios:
      - Index: scenarios/README.md
      - For users:
          - OFW / migrant worker: scenarios/worker-self-help.md
          - "OFW (Tagalog draft)": scenarios/translations/worker-self-help.tl.md
          - "OFW (Spanish draft)": scenarios/translations/worker-self-help.es.md
          - Caseworker workflow: scenarios/caseworker_workflow.md
          - Legal aid lawyer: scenarios/lawyer-evidence-prep.md
          - Researcher: scenarios/researcher-analysis.md
          - Investigative journalist: scenarios/journalist-investigation.md
          - Recruitment compliance: scenarios/recruiter-self-audit.md
      - For organizations:
          - NGO director: scenarios/ngo-office-deployment.md
          - IT director: scenarios/it-director.md
          - Chief architect: scenarios/chief-architect.md
          - VP Engineering: scenarios/vp-engineering.md
          - Platform CTO: scenarios/enterprise_pilot.md
          - Government regulator: scenarios/regulator-pattern-analysis.md
          - Embassy / consulate: scenarios/embassy-consular.md
          - ILO / IOM regional: scenarios/ilo-iom-regional.md
  - Strategic:
      - Ecosystem overview: ecosystem_overview.md
      - "Maria's case end-to-end": marias_case_end_to_end.md
      - Cross-NGO trends federation: cross_ngo_trends_federation.md
      - 2-week submission plan: two_week_submission_plan.md
  - Submission:
      - For judges: FOR_JUDGES.md
      - Writeup draft: writeup_draft.md
      - Rubric evaluation: rubric_evaluation_v07.md
      - Project status: project_status.md
      - Notebook QA companion: notebook_qa_companion.md
      - Bench-and-tune readiness: bench_and_tune_readiness.md
  - Architecture:
