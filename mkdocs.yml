site_name: Duecare
site_url: https://tayloramareltech.github.io/gemma4_comp/
site_description: >-
  Open-source AI safety harness around Google's Gemma 4 — for migrant
  workers, NGOs, regulators, and researchers fighting recruitment
  fraud and trafficking. MIT licensed. Runs offline.
site_author: Taylor Amarel
repo_url: https://github.com/TaylorAmarelTech/gemma4_comp
repo_name: TaylorAmarelTech/gemma4_comp
edit_uri: edit/master/docs/
copyright: >-
  MIT licensed.
  <a href="https://github.com/TaylorAmarelTech/gemma4_comp">Source on GitHub.</a>

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/TaylorAmarelTech
    - icon: fontawesome/brands/kaggle
      link: https://www.kaggle.com/taylorsamarel

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  # mkdocs-material has these built in; add others via requirements-docs.txt
  # - awesome-pages
  # - git-revision-date-localized
  # - minify

# Navigation — curated path through the docs tree. Untouched docs
# remain indexable + searchable but don't appear in the sidebar.
