name: Claude Code PR Review

# Runs the official anthropics/claude-code-action on @claude mentions.
# The action reads our project's CLAUDE.md, AGENTS.md files in the
# edited subtree, and .claude/rules/*.md so reviews are grounded in
# our actual conventions.
#
# To activate: add a repository secret ANTHROPIC_API_KEY.
# If the secret is missing, the action is a no-op.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  # Manual dispatch for explicit test runs
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    # Only run when the trigger contains @claude OR when it's a PR review submission
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude Code review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Optional: pass additional context about the project
          additional_context: |
            This is the gemma4_comp project — an agentic LLM safety harness
            for the Gemma 4 Good Hackathon. Before reviewing, read:
              - CLAUDE.md at the project root
              - .claude/rules/*.md (auto-loaded rules)
              - docs/the_forge.md (north-star architecture)
              - docs/project_phases.md (4-phase plan)
              - docs/rubric_alignment.md (hackathon rubric gap analysis)

            Every review should evaluate changes against the three overarching
            goals (.claude/rules/00_overarching_goals.md):
              1. Impact & Vision (40 pts)
              2. Video Pitch & Storytelling (30 pts)
              3. Technical Depth & Execution (30 pts)

            The folder-per-module pattern (.claude/rules/40_forge_module_contract.md)
            is strictly enforced. Every module folder has PURPOSE/AGENTS/
            INPUTS_OUTPUTS/HIERARCHY/DIAGRAM/TESTS/STATUS meta files that
            are auto-generated by scripts/generate_forge.py.
