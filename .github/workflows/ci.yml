name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  gitleaks:
    name: gitleaks (PII / secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  prompt-corpus-validate:
    name: prompt corpus validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate corpus + regenerate stats + per-category exports
        run: |
          python scripts/prompt_corpus.py validate
          python scripts/prompt_corpus.py stats
          python scripts/prompt_corpus.py export-by-category

  harness-smoke:
    name: harness smoke (counts at thresholds)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install duecare-llm-chat from source
        run: |
          pip install --upgrade pip wheel
          pip install -e packages/duecare-llm-chat
      - name: Smoke-check harness imports + counts
        run: python scripts/verify.py

  harness-lift-gate:
    name: harness lift (no silent regression)
    runs-on: ubuntu-latest
    needs: harness-smoke
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install duecare-llm-chat from source
        run: |
          pip install --upgrade pip wheel
          pip install -e packages/duecare-llm-chat
      - name: Run rubric comparison + assert thresholds
        run: |
          python scripts/rubric_comparison.py \
              --output /tmp/lift.md \
              --json-output /tmp/lift.json
          python - <<'PYEOF'
          import json, sys
          d = json.loads(open("/tmp/lift.json").read())
          dim = d["per_dimension"]
          checks = [
              ("Mean overall lift",      d["overall"]["lift_mean_pp"], 50.0),
              ("Jurisdiction-specific",  dim["1_jurisdiction"]["lift_pp"], 80.0),
              ("ILO / international",    dim["2_ilo_international"]["lift_pp"], 45.0),
              ("Substance-over-form",    dim["3_substance_over_form"]["lift_pp"], 30.0),
          ]
          fails = []
          for name, m, floor in checks:
              status = "OK" if m >= floor else "FAIL"
              print(f"  [{status}] {name:30s} +{m:5.1f} pp (floor +{floor:.1f})")
              if m < floor:
                  fails.append((name, m, floor))
          if fails:
              print()
              print("Lift regressed below documented thresholds.")
              print("Either fix the regression or update writeup_draft.md / FOR_JUDGES.md / harness_lift_report.md.")
              sys.exit(1)
          PYEOF

  test:
    name: pytest + adversarial
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install uv
        run: pip install uv

      - name: Install workspace (all 17 packages)
        run: |
          uv sync --all-packages
          uv pip install pytest pyyaml

      - name: Run unit + integration suite
        run: uv run pytest packages tests -q --no-header

      - name: Adversarial validation
        run: uv run python scripts/adversarial_validation.py --all --stress 2

  build-wheels:
    name: build 17 wheels
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build all 17 packages
        run: |
          for pkg in packages/duecare-llm-*; do
            echo "::group::Building $pkg"
            python -m build --wheel "$pkg"
            echo "::endgroup::"
          done

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: duecare-wheels-${{ github.sha }}
          path: packages/*/dist/*.whl
          retention-days: 30

  cleanroom:
    name: clean-room install
    runs-on: ubuntu-latest
    needs: build-wheels
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build wheels
        run: |
          for pkg in packages/duecare-llm-*; do
            python -m build --wheel "$pkg"
          done

      - name: Clean-room install smoke test
        run: python scripts/cleanroom_install.py

  notebooks:
    name: execute 4 kaggle notebooks
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install workspace
        run: |
          uv sync --all-packages
          uv pip install jupyter nbconvert

      - name: Execute each notebook
        run: |
          for nb in notebooks/01_quickstart.ipynb \
                    notebooks/02_cross_domain_proof.ipynb \
                    notebooks/03_agent_swarm_deep_dive.ipynb \
                    notebooks/04_submission_walkthrough.ipynb; do
            echo "::group::Executing $nb"
            uv run jupyter nbconvert --to notebook --execute --inplace "$nb"
            echo "::endgroup::"
          done
