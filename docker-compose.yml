# Duecare full local stack — chat playground + classifier + Ollama.
#
# Usage:
#   docker compose up           # starts everything (chat 8080 + classifier 8081 + ollama 11434)
#   docker compose up chat      # just the chat playground
#   docker compose up -d        # detached (background)
#   docker compose logs -f      # tail logs
#   docker compose down -v      # stop + drop volumes (deletes Ollama model cache)
#
# After it boots:
#   - chat playground:  http://localhost:8080
#   - classifier:       http://localhost:8081  (POST /api/classifier/evaluate)
#   - Ollama:           http://localhost:11434 (model server)
#
# First run pulls the gemma2:2b Ollama model (~1.5 GB). Set
# DUECARE_OLLAMA_MODEL=gemma2:9b in .env to use the larger variant
# (~5.4 GB, requires 8GB+ RAM). Once Gemma 4 is in Ollama stable,
# use gemma4:e2b (~1.5 GB) or gemma4:e4b (~4 GB).
#
# GPU: uncomment the `deploy.resources.reservations.devices` block
# under the ollama service if you have NVIDIA + nvidia-container-toolkit
# installed.

services:

  chat:
    build:
      context: .
      dockerfile: Dockerfile
    image: duecare-llm:latest
    container_name: duecare-chat
    restart: unless-stopped
    ports:
      - "${DUECARE_CHAT_PORT:-8080}:8080"
    environment:
      DUECARE_LOG_LEVEL: ${DUECARE_LOG_LEVEL:-info}
      OLLAMA_HOST: http://ollama:11434
      DUECARE_OLLAMA_MODEL: ${DUECARE_OLLAMA_MODEL:-gemma2:2b}
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks: [duecare]

  classifier:
    image: duecare-llm:latest
    container_name: duecare-classifier
    restart: unless-stopped
    ports:
      - "${DUECARE_CLASSIFIER_PORT:-8081}:8080"
    environment:
      DUECARE_LOG_LEVEL: ${DUECARE_LOG_LEVEL:-info}
      OLLAMA_HOST: http://ollama:11434
      DUECARE_OLLAMA_MODEL: ${DUECARE_OLLAMA_MODEL:-gemma2:2b}
    command: ["--classifier", "--host", "0.0.0.0", "--port", "8080"]
    depends_on:
      chat:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [duecare]

  ollama:
    image: ollama/ollama:latest
    container_name: duecare-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 5
    # Uncomment for NVIDIA GPU acceleration (requires nvidia-container-toolkit)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    networks: [duecare]

  ollama-init:
    # One-shot helper: pulls the configured Ollama model on first run.
    # `restart: no` so it doesn't re-fire on every container start.
    image: ollama/ollama:latest
    container_name: duecare-ollama-init
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint:
      - sh
      - -c
      - |
        echo "Pulling model ${DUECARE_OLLAMA_MODEL:-gemma2:2b}..."
        ollama pull ${DUECARE_OLLAMA_MODEL:-gemma2:2b}
        echo "Model ready."
    networks: [duecare]

volumes:
  ollama_data:
    driver: local

networks:
  duecare:
    driver: bridge
