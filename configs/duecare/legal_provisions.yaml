# Verified Legal Provisions Database
# Source: trafficking_llm_benchmark expanded_taxonomy.py
#
# 31 verified legal provisions across 15+ jurisdictions.
# Used by: multi_layer_evaluator (source validation layer),
# function calling tools (check_legal_framework),
# and LLM-as-Judge (legal accuracy scoring).

provisions:
  # ── Philippines ──
  - id: PH_RA10022_S6
    jurisdiction: PH
    law: "RA 10022 (Migrant Workers Act, amended 2010)"
    section: "Section 6"
    type: prohibition
    description: "Prohibits illegal recruitment — charging excessive fees, contract substitution, deploying through unlicensed agencies"
    penalty: "6-12 years imprisonment + PHP 200,000-500,000 fine"
    enforcement: POEA

  - id: PH_RA10022_S7
    jurisdiction: PH
    law: "RA 10022"
    section: "Section 7"
    type: prohibition
    description: "Prohibits charging workers any recruitment fees for domestic work"
    penalty: "License revocation + imprisonment"
    enforcement: POEA

  - id: PH_RA8042_S6
    jurisdiction: PH
    law: "RA 8042 (Migrant Workers and Overseas Filipinos Act)"
    section: "Section 6"
    type: prohibition
    description: "Defines and prohibits illegal recruitment; economic sabotage if committed by syndicate"
    penalty: "Life imprisonment + PHP 500,000-1,000,000 fine"
    enforcement: DOLE/POEA

  - id: PH_RA9208
    jurisdiction: PH
    law: "RA 9208 (Anti-Trafficking in Persons Act)"
    section: "Sections 4-5"
    type: prohibition
    description: "Criminalizes trafficking in persons including recruitment by fraud, coercion, or debt bondage"
    penalty: "20 years imprisonment + PHP 1,000,000-2,000,000 fine"

  - id: PH_RA10364
    jurisdiction: PH
    law: "RA 10364 (Expanded Anti-Trafficking Act)"
    section: "Amendment"
    type: prohibition
    description: "Expands trafficking definition to include forced labor, attempted trafficking"

  # ── Hong Kong ──
  - id: HK_EO_S57
    jurisdiction: HK
    law: "Employment Ordinance (Cap. 57)"
    section: "Section 32"
    type: requirement
    description: "Limits employment agency commission to 10% of first month wages"
    penalty: "Fine up to HK$350,000"

  - id: HK_FDH_WAGE
    jurisdiction: HK
    law: "FDH Minimum Allowable Wage"
    type: requirement
    description: "Minimum wage for foreign domestic helpers: HK$4,870/month (2024)"
    note: "Reviewed annually by government"

  - id: HK_MLO_163
    jurisdiction: HK
    law: "Money Lenders Ordinance (Cap. 163)"
    section: "Section 24"
    type: prohibition
    description: "Interest rate > 48% APR is extortionate; > 60% is criminal"
    penalty: "2 years imprisonment for > 60% APR"

  - id: HK_EO_REST
    jurisdiction: HK
    law: "Employment Ordinance (Cap. 57)"
    section: "Section 36"
    type: requirement
    description: "Workers entitled to minimum 1 rest day per 7-day period"

  # ── Singapore ──
  - id: SG_EFMA_S22
    jurisdiction: SG
    law: "Employment of Foreign Manpower Act (EFMA)"
    section: "Section 22"
    type: prohibition
    description: "Prohibits recovering costs from worker through salary deductions exceeding limits"
    penalty: "Fine $30,000 or 12 months imprisonment"

  # ── Saudi Arabia ──
  - id: SA_LL_WAGE
    jurisdiction: SA
    law: "Saudi Labor Law"
    section: "Article 90"
    type: requirement
    description: "Wages must be paid monthly; employer bears recruitment costs under reformed kafala"

  - id: SA_LL_40
    jurisdiction: SA
    law: "Saudi Labor Law"
    section: "Article 40"
    type: prohibition
    description: "Employer may not retain worker's passport (reformed 2021)"
    note: "Enforcement remains inconsistent"

  # ── Qatar ──
  - id: QA_LL_2004
    jurisdiction: QA
    law: "Labor Law 2004"
    section: "Article 66"
    type: prohibition
    description: "Prohibits passport confiscation by employer"
    penalty: "Fine + imprisonment"

  - id: QA_WPS
    jurisdiction: QA
    law: "Wage Protection System"
    type: requirement
    description: "Electronic wage payment within 7 days of due date"

  # ── International (ILO) ──
  - id: ILO_C029
    jurisdiction: INTL
    law: "ILO Convention 29 — Forced Labour (1930)"
    type: prohibition
    description: "Prohibits all forms of forced or compulsory labour"
    note: "Ratified by 179 countries"

  - id: ILO_C181
    jurisdiction: INTL
    law: "ILO Convention 181 — Private Employment Agencies (1997)"
    section: "Article 7"
    type: prohibition
    description: "Workers shall not be charged directly or indirectly, in whole or in part, any fees or costs"
    note: "The foundation of the 'employer pays' principle"

  - id: ILO_C189
    jurisdiction: INTL
    law: "ILO Convention 189 — Domestic Workers (2011)"
    type: right
    description: "Domestic workers entitled to: weekly rest, minimum wage, written contract, safe conditions"

  - id: ILO_C095
    jurisdiction: INTL
    law: "ILO Convention 95 — Protection of Wages (1949)"
    section: "Article 8"
    type: requirement
    description: "Deductions from wages only with consent and within limits set by law"

  - id: ILO_P029
    jurisdiction: INTL
    law: "ILO Protocol to C029 — Forced Labour (2014)"
    type: prohibition
    description: "Updates C029 with victim protection, prevention, and compensation requirements"

  - id: PALERMO
    jurisdiction: INTL
    law: "UN Protocol to Prevent, Suppress and Punish Trafficking in Persons (Palermo Protocol, 2000)"
    type: prohibition
    description: "Defines trafficking in persons; requires criminalization and victim protection"
    note: "173 state parties as of 2024"

  - id: DHAKA
    jurisdiction: INTL
    law: "Dhaka Principles for Migration with Dignity"
    type: principle
    description: "10 principles including: no fees to workers, written contracts, freedom of movement, safe conditions"
    note: "Voluntary framework endorsed by IOM and major businesses"

  # ── United States ──
  - id: US_TVPA
    jurisdiction: US
    law: "Trafficking Victims Protection Act (TVPA, 2000)"
    type: prohibition
    description: "Criminalizes trafficking; defines labor trafficking as recruitment through force, fraud, or coercion"
    penalty: "Up to 20 years imprisonment; life if aggravated"

  - id: US_FLSA
    jurisdiction: US
    law: "Fair Labor Standards Act"
    type: requirement
    description: "Federal minimum wage, overtime pay, child labor protections"

  # ── United Kingdom ──
  - id: UK_MSA
    jurisdiction: UK
    law: "Modern Slavery Act 2015"
    type: prohibition
    description: "Criminalizes slavery, servitude, forced labor, and trafficking"
    penalty: "Life imprisonment (maximum)"

  # ── Taiwan ──
  - id: TW_LSA_FORCED
    jurisdiction: TW
    law: "Labor Standards Act"
    section: "Article 5"
    type: prohibition
    description: "Prohibits forced labor and retention of identity documents"
    penalty: "Imprisonment up to 5 years"

  # ── Malaysia ──
  - id: MY_ATIPSOM
    jurisdiction: MY
    law: "Anti-Trafficking in Persons and Anti-Smuggling of Migrants Act 2007 (ATIPSOM)"
    type: prohibition
    description: "Criminalizes trafficking including labor exploitation"
