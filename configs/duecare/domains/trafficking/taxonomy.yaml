  - { id: ID-MY, origin: Indonesia, destination: Malaysia }
  - { id: ID-SA, origin: Indonesia, destination: Saudi Arabia }
  - { id: BD-QA, origin: Bangladesh, destination: Qatar }
  - { id: LK-KW, origin: Sri Lanka, destination: Kuwait }
